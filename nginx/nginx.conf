# Nginx Configuration for Blindr Services
# Reverse proxy with load balancing and SSL termination

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging format
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # Basic settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;  # Allow large audio files
    
    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=upload:10m rate=5r/s;

    # Upstream definitions
    upstream whisper_backend {
        least_conn;
        server whisper-service:9000 max_fails=3 fail_timeout=30s;
        # Add more whisper instances for scaling:
        # server whisper-service-2:9000 max_fails=3 fail_timeout=30s;
    }

    upstream piper_backend {
        least_conn;
        server piper-service:9001 max_fails=3 fail_timeout=30s;
        # Add more piper instances for scaling:
        # server piper-service-2:9001 max_fails=3 fail_timeout=30s;
    }

    # Default server (catch-all)
    server {
        listen 80 default_server;
        server_name _;
        
        # Health check endpoint
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }
        
        # Redirect all other HTTP traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Main HTTPS server
    server {
        listen 443 ssl http2;
        server_name localhost;  # Change this to your domain

        # SSL Configuration
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES128-GCM-SHA256;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Root location - API documentation or status page
        location / {
            return 200 '{"status":"Blindr Services Gateway","services":{"whisper":"/api/v1/whisper","piper":"/api/v1/piper"}}';
            add_header Content-Type application/json;
        }

        # Whisper Speech-to-Text API
        location /api/v1/whisper/ {
            limit_req zone=upload burst=5 nodelay;
            
            # Remove /api/v1/whisper prefix when forwarding
            rewrite ^/api/v1/whisper/(.*) /$1 break;
            
            proxy_pass http://whisper_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeouts for long-running transcription
            proxy_connect_timeout 30s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
            
            # Buffer settings for large audio files
            proxy_buffering off;
            proxy_request_buffering off;
        }

        # Piper Text-to-Speech API
        location /api/v1/piper/ {
            limit_req zone=api burst=10 nodelay;
            
            # Remove /api/v1/piper prefix when forwarding
            rewrite ^/api/v1/piper/(.*) /$1 break;
            
            proxy_pass http://piper_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Standard timeouts for TTS
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Direct service access (for development/debugging)
        location /whisper/ {
            limit_req zone=upload burst=5 nodelay;
            rewrite ^/whisper/(.*) /$1 break;
            proxy_pass http://whisper_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 30s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
            proxy_buffering off;
            proxy_request_buffering off;
        }

        location /piper/ {
            limit_req zone=api burst=10 nodelay;
            rewrite ^/piper/(.*) /$1 break;
            proxy_pass http://piper_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Service health checks
        location /health/whisper {
            access_log off;
            proxy_pass http://whisper_backend/health;
            proxy_connect_timeout 5s;
            proxy_send_timeout 5s;
            proxy_read_timeout 5s;
        }

        location /health/piper {
            access_log off;
            proxy_pass http://piper_backend/health;
            proxy_connect_timeout 5s;
            proxy_send_timeout 5s;
            proxy_read_timeout 5s;
        }

        # Prometheus metrics (if monitoring enabled)
        location /metrics {
            proxy_pass http://prometheus:9090/metrics;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Optional: Restrict access to metrics
            # allow 127.0.0.1;
            # allow 192.168.0.0/16;
            # allow 172.16.0.0/12;
            # deny all;
        }

        # Error pages
        error_page 404 /404.json;
        location = /404.json {
            return 404 '{"error":"Not Found","message":"The requested resource was not found"}';
            add_header Content-Type application/json;
        }

        error_page 500 502 503 504 /50x.json;
        location = /50x.json {
            return 500 '{"error":"Internal Server Error","message":"The server encountered an internal error"}';
            add_header Content-Type application/json;
        }
    }
}