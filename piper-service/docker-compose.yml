services:
  piper-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: piper-service
    ports:
      - "9001:9001"
    volumes:
      - /home/travis/services/data/piper/models:/app/models/piper
    environment:
      - PIPER_PORT=9001
      - PIPER_HOST=0.0.0.0
      - PIPER_DEFAULT_VOICE=en_US-lessac-medium
      - PIPER_MODELS_DIR=/app/models/piper
      - PIPER_LOG_FILE=/app/logs/piper-service.log
      - PIPER_MAX_TEXT_LENGTH=10000
      - PIPER_MAX_CONCURRENT=10
      - PIPER_MODEL_CACHE_SIZE=5
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9001/health"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 45s
