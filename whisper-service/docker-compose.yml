services:
  whisper-service:
    build: .
    image: whisper-service:latest
    container_name: whisper-service
    restart: unless-stopped

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

    ports:
      - "9000:9000"

    environment:
      - WHISPER_PORT=9000
      - WHISPER_HOST=0.0.0.0
      - WHISPER_MODEL_SIZE=small
      - CUDA_VISIBLE_DEVICES=0
      - TORCH_CUDNN_V8_API_DISABLED=1
      - TOKENIZERS_PARALLELISM=false
      - LOG_LEVEL=INFO
      - WHISPER_LOG_FILE=/app/logs/whisper-service.log
      - PYTHONUNBUFFERED=1

    volumes:
      - /home/travis/services/data/whisper/models:/root/.cache/huggingface
      - ../logs:/app/logs
      - type: tmpfs
        target: /app/tmp
        tmpfs:
          size: 1G

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
