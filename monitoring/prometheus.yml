# Prometheus Configuration for Blindr Services
# Monitors service health, performance, and resource usage

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'blindr-services'
    environment: 'production'

# Alertmanager configuration (optional)
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          # - alertmanager:9093

# Rule files for alerts (create separate files as needed)
rule_files:
  # - "alerts/*.yml"

# Scrape configurations
scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # Whisper Service Monitoring
  - job_name: 'whisper-service'
    static_configs:
      - targets: ['whisper-service:9000']
    metrics_path: '/metrics'
    scrape_interval: 15s
    scrape_timeout: 10s
    params:
      format: ['prometheus']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
      - source_labels: [__address__]
        target_label: service
        replacement: 'whisper'

  # Piper Service Monitoring  
  - job_name: 'piper-service'
    static_configs:
      - targets: ['piper-service:9001']
    metrics_path: '/metrics'
    scrape_interval: 15s
    scrape_timeout: 10s
    params:
      format: ['prometheus']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
      - source_labels: [__address__]
        target_label: service
        replacement: 'piper'

  # Nginx Reverse Proxy (if nginx-prometheus-exporter is added)
  - job_name: 'nginx-proxy'
    static_configs:
      - targets: ['nginx-proxy:9113']  # nginx-prometheus-exporter port
    metrics_path: '/metrics'
    scrape_interval: 30s
    scrape_timeout: 5s

  # Docker container metrics (if cadvisor is added)
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    metrics_path: '/metrics'
    scrape_interval: 30s
    scrape_timeout: 10s

  # Node/System metrics (if node_exporter is added)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    metrics_path: '/metrics'
    scrape_interval: 30s
    scrape_timeout: 10s

  # Health check endpoints
  - job_name: 'service-health'
    static_configs:
      - targets: 
        - 'whisper-service:9000'
        - 'piper-service:9001'
    metrics_path: '/health'
    scrape_interval: 30s
    scrape_timeout: 5s
    params:
      format: ['prometheus']

